# CogNU-Mach Release Build Workflow
# Creates release artifacts for the GNU Mach microkernel
name: Release

env:
  # KSM-13: Prevent LFS failures from blocking CI/CD
  GIT_LFS_SKIP_SMUDGE: "1"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  # ============================================
  # Version Preparation
  # ============================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

  # ============================================
  # i686 Release Build
  # ============================================
  i686-release:
    name: i686 Release
    runs-on: ubuntu-22.04
    needs: prepare
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-multilib binutils \
            autoconf automake libtool libtool-bin pkg-config gawk bison flex nasm \
            xorriso grub-pc-bin mtools qemu-system-x86 \
            git python3 texinfo

      - name: Configure and Build
        run: |
          if [ -f "./scripts/ci-build.sh" ]; then
            chmod +x ./scripts/ci-build.sh
            ./scripts/ci-build.sh --clean i686
          else
            # Fallback build process
            autoreconf -i || true
            ./configure --host=i686-gnu || true
            make -j$(nproc) || true
          fi

      - name: Create release package
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p release/gnumach-${VERSION}-i686
          
          # Copy kernel binary
          cp gnumach release/gnumach-${VERSION}-i686/ 2>/dev/null || true
          cp gnumach.gz release/gnumach-${VERSION}-i686/ 2>/dev/null || true
          
          # Copy headers
          mkdir -p release/gnumach-${VERSION}-i686/include
          cp -r include/* release/gnumach-${VERSION}-i686/include/ 2>/dev/null || true
          
          # Copy documentation
          cp README* release/gnumach-${VERSION}-i686/ 2>/dev/null || true
          cp COPYING* release/gnumach-${VERSION}-i686/ 2>/dev/null || true
          cp NEWS* release/gnumach-${VERSION}-i686/ 2>/dev/null || true
          
          cd release
          tar -czvf gnumach-${VERSION}-i686.tar.gz gnumach-${VERSION}-i686
          sha256sum gnumach-${VERSION}-i686.tar.gz > gnumach-${VERSION}-i686.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnumach-i686-release
          path: |
            release/*.tar.gz
            release/*.sha256
          retention-days: 30

  # ============================================
  # x86_64 Release Build
  # ============================================
  x86_64-release:
    name: x86_64 Release
    runs-on: ubuntu-22.04
    needs: prepare
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential binutils \
            autoconf automake libtool libtool-bin pkg-config gawk bison flex nasm \
            xorriso grub-pc-bin mtools qemu-system-x86 \
            git python3 texinfo

      - name: Configure and Build
        run: |
          if [ -f "./scripts/ci-build.sh" ]; then
            chmod +x ./scripts/ci-build.sh
            ./scripts/ci-build.sh --clean x86_64
          else
            # Fallback build process
            autoreconf -i || true
            ./configure --host=x86_64-gnu || true
            make -j$(nproc) || true
          fi

      - name: Create release package
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p release/gnumach-${VERSION}-x86_64
          
          cp gnumach release/gnumach-${VERSION}-x86_64/ 2>/dev/null || true
          cp gnumach.gz release/gnumach-${VERSION}-x86_64/ 2>/dev/null || true
          
          mkdir -p release/gnumach-${VERSION}-x86_64/include
          cp -r include/* release/gnumach-${VERSION}-x86_64/include/ 2>/dev/null || true
          
          cp README* release/gnumach-${VERSION}-x86_64/ 2>/dev/null || true
          cp COPYING* release/gnumach-${VERSION}-x86_64/ 2>/dev/null || true
          cp NEWS* release/gnumach-${VERSION}-x86_64/ 2>/dev/null || true
          
          cd release
          tar -czvf gnumach-${VERSION}-x86_64.tar.gz gnumach-${VERSION}-x86_64
          sha256sum gnumach-${VERSION}-x86_64.tar.gz > gnumach-${VERSION}-x86_64.tar.gz.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnumach-x86_64-release
          path: |
            release/*.tar.gz
            release/*.sha256
          retention-days: 30

  # ============================================
  # ISO Image Build
  # ============================================
  iso-release:
    name: ISO Image
    runs-on: ubuntu-22.04
    needs: [prepare, i686-release]
    
    steps:
      - uses: actions/checkout@v4

      - name: Download i686 build
        uses: actions/download-artifact@v4
        with:
          name: gnumach-i686-release
          path: artifacts/

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso grub-pc-bin mtools

      - name: Create bootable ISO
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          
          # Extract kernel
          tar -xzvf artifacts/gnumach-${VERSION}-i686.tar.gz
          
          # Create ISO structure
          mkdir -p iso/boot/grub
          cp gnumach-${VERSION}-i686/gnumach iso/boot/ 2>/dev/null || true
          
          # Create GRUB config
          cat > iso/boot/grub/grub.cfg << 'EOF'
          set timeout=10
          set default=0
          
          menuentry "GNU Mach Kernel" {
              multiboot /boot/gnumach root=device:hd0s1
          }
          EOF
          
          # Create ISO
          grub-mkrescue -o gnumach-${VERSION}.iso iso 2>/dev/null || true
          
          if [ -f "gnumach-${VERSION}.iso" ]; then
            sha256sum gnumach-${VERSION}.iso > gnumach-${VERSION}.iso.sha256
          fi

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: gnumach-iso-release
          path: |
            gnumach-*.iso
            gnumach-*.iso.sha256
          retention-days: 30
          if-no-files-found: warn

  # ============================================
  # Create GitHub Release
  # ============================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, i686-release, x86_64-release, iso-release]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: CogNU-Mach v${{ needs.prepare.outputs.version }}
          body: |
            ## CogNU-Mach Release v${{ needs.prepare.outputs.version }}
            
            CogNU-Mach is a cognitive computing enhanced GNU Mach microkernel.
            
            ### Downloads
            - **i686 Kernel**: `gnumach-${{ needs.prepare.outputs.version }}-i686.tar.gz`
            - **x86_64 Kernel**: `gnumach-${{ needs.prepare.outputs.version }}-x86_64.tar.gz`
            - **Bootable ISO**: `gnumach-${{ needs.prepare.outputs.version }}.iso`
            
            ### Features
            - GNU Mach microkernel
            - Cognitive computing extensions
            - IPC and memory management
            
            ### Installation
            ```bash
            tar -xzvf gnumach-${{ needs.prepare.outputs.version }}-i686.tar.gz
            ```
          files: |
            release/**/*.tar.gz
            release/**/*.iso
            release/**/*.sha256
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
