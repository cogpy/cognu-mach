name: Release

env:
  # KSM-13: Prevent LFS failures from blocking CI/CD
  GIT_LFS_SKIP_SMUDGE: "1"

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc-multilib binutils binutils-multiarch \
          autoconf automake libtool libtool-bin pkg-config gawk bison flex nasm \
          xorriso grub-pc-bin mtools qemu-system-x86 \
          git python3 cppcheck clang-tools texinfo

    - name: Build kernel (i686)
      timeout-minutes: 20
      run: ./scripts/ci-build.sh --force-build i686

    - name: Package artifact
      run: |
        mkdir -p release
        cp build-i686/gnumach release/cognu-mach
        tar -czvf cognu-mach-${{ github.ref_name }}.tar.gz -C release .

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: cognu-mach-${{ github.ref_name }}.tar.gz
        asset_name: cognu-mach-${{ github.ref_name }}.tar.gz
        asset_content_type: application/gzip
