name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [i686, x86_64]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake

    - name: Configure and build
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_CXX_STANDARD=11
        make

    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure
